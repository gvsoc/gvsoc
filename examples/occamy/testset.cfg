from gvtest.testsuite import *

def testset_build(testset):
    testset.set_name('occamy')

    cwd = testset.get_path()
    test = testset.new_test('occamy')
    test.add_command(Shell('run', 'mkdir -p occamy'))
    test.add_command(Shell('run', f'gvrun --target occamy --work-dir occamy --param chip/soc/binary={cwd}/offload-multi_cluster.elf run'))
