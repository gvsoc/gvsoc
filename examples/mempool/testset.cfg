from gvtest.testsuite import *

def testset_build(testset):
    testset.set_name('mempool')

    cwd = testset.get_path()
    test = testset.new_test('mempool')
    test.add_command(Shell('run', 'mkdir -p mempool'))
    test.add_command(Shell('run', f'gvsoc --target=mempool --work mempool --binary {cwd}/mempool_test run'))
