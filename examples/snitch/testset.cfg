from gvtest.testsuite import *

def testset_build(testset):
    testset.set_name('snitch')

    cwd = testset.get_path()
    test = testset.new_test('snitch')
    test.add_command(Shell('run', 'mkdir -p snitch'))
    test.add_command(Shell('run', f'gvrun --target snitch --work-dir snitch --param chip/soc/binary={cwd}/fp32_computation_vector.elf run'))
