from gvtest import *

def testset_build(testset):

    testset.set_name('tests')

    testset.import_testset(file='pulp-sdk/tests/testset.cfg')
    testset.import_testset(file='chimera-sdk/testset.cfg')
    testset.import_testset(file='snitch/testset.cfg')
    testset.import_testset(file='spatz/testset.cfg')
    testset.import_testset(file='ara/testset.cfg')
    testset.import_testset(file='rv64/testset.cfg')
    testset.import_testset(file='magia-sdk/testset.cfg')
    testset.import_testset(file='pulp-nn/testset.cfg')
    testset.import_testset(file='siracusa/testset.cfg')
